services:
  # ─── Backend Java Spring Boot ───────────────────────────────
  - type: web
    name: diziman-backend
    runtime: java
    rootDir: backend
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/backend-0.0.1-SNAPSHOT.jar
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: diziman-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: diziman-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: diziman-db
          property: password
      - key: FRONTEND_URL
        value: https://diziman-frontend.onrender.com

  # ─── Frontend Angular ────────────────────────────────────────
  - type: web
    name: diziman-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build -- --configuration production
    staticPublishPath: dist/frontend/browser
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ─── Banco de Dados PostgreSQL ───────────────────────────────
databases:
  - name: diziman-db
    plan: free
