services:
  # ─── Backend Java Spring Boot ───────────────────────────────
  - type: web
    name: diziman-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: PGHOST
        fromDatabase:
          name: diziman-db
          property: host
      - key: PGPORT
        fromDatabase:
          name: diziman-db
          property: port
      - key: PGDATABASE
        fromDatabase:
          name: diziman-db
          property: database
      - key: PGUSER
        fromDatabase:
          name: diziman-db
          property: user
      - key: PGPASSWORD
        fromDatabase:
          name: diziman-db
          property: password
      - key: FRONTEND_URL
        value: https://diziman-frontend.onrender.com

  # ─── Frontend Angular ────────────────────────────────────────
  - type: web
    name: diziman-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build -- --configuration production
    staticPublishPath: dist/frontend/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ─── Banco de Dados PostgreSQL ───────────────────────────────
databases:
  - name: diziman-db
    plan: free
