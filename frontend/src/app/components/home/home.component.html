<!-- Navbar -->
<nav class="navbar navbar-dark px-4 py-3" style="background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%); box-shadow: 0 2px 12px rgba(37,99,235,0.18);">
  <div class="d-flex align-items-center gap-3">
    <span style="font-size:1.7rem;">&#9962;</span>
    <div>
      <span class="navbar-brand mb-0 fw-bold fs-5">DIZIMAN</span>
      <span class="text-white-50 ms-2 small d-none d-md-inline">Sistema de Gestão da Igreja</span>
    </div>
  </div>
  <div class="d-flex align-items-center gap-3">
    <span class="text-white-50 small d-none d-md-inline">
      <i class="bi bi-person-circle me-1"></i>{{ user?.name }}
    </span>
    <button class="btn btn-outline-light btn-sm" (click)="logout()">
      <i class="bi bi-box-arrow-right me-1"></i> Sair
    </button>
  </div>
</nav>

<div class="container py-5" style="max-width:900px;">
  <div class="text-center mb-5">
    <h4 class="fw-bold" style="color:#1e3a5f;">Bem-vindo, {{ user?.name }}!</h4>
    <p class="text-muted">O que deseja gerenciar hoje?</p>
  </div>

  <div class="row justify-content-center g-4">
    <!-- Membros -->
    <div class="col-6 col-md-3">
      <a routerLink="/members" class="text-decoration-none">
        <div class="card border-0 shadow-sm h-100 home-card">
          <div class="card-body text-center py-4">
            <div class="home-icon mb-3" style="background:#eff6ff; color:#2563eb;">
              <i class="bi bi-people-fill fs-3"></i>
            </div>
            <h6 class="fw-bold mb-1" style="color:#1e3a5f;">Membros</h6>
            <small class="text-muted">Cadastro e gestão</small>
          </div>
        </div>
      </a>
    </div>

    <!-- Dízimo -->
    <div class="col-6 col-md-3">
      <a routerLink="/tithe-registration" class="text-decoration-none">
        <div class="card border-0 shadow-sm h-100 home-card">
          <div class="card-body text-center py-4">
            <div class="home-icon mb-3" style="background:#f0fdf4; color:#16a34a;">
              <i class="bi bi-cash-coin fs-3"></i>
            </div>
            <h6 class="fw-bold mb-1" style="color:#1e3a5f;">Dízimos</h6>
            <small class="text-muted">Registros e controle</small>
          </div>
        </div>
      </a>
    </div>

    <!-- Oferta -->
    <div class="col-6 col-md-3">
      <a routerLink="/offering-registration" class="text-decoration-none">
        <div class="card border-0 shadow-sm h-100 home-card">
          <div class="card-body text-center py-4">
            <div class="home-icon mb-3" style="background:#fefce8; color:#ca8a04;">
              <i class="bi bi-gift-fill fs-3"></i>
            </div>
            <h6 class="fw-bold mb-1" style="color:#1e3a5f;">Ofertas</h6>
            <small class="text-muted">Gerenciar ofertas</small>
          </div>
        </div>
      </a>
    </div>

    <!-- Dashboard -->
    <div class="col-6 col-md-3">
      <a routerLink="/dashboard" class="text-decoration-none">
        <div class="card border-0 shadow-sm h-100 home-card">
          <div class="card-body text-center py-4">
            <div class="home-icon mb-3" style="background:#fdf4ff; color:#9333ea;">
              <i class="bi bi-bar-chart-fill fs-3"></i>
            </div>
            <h6 class="fw-bold mb-1" style="color:#1e3a5f;">Dashboard</h6>
            <small class="text-muted">Relatórios financeiros</small>
          </div>
        </div>
      </a>
    </div>
  </div>
</div>
