<!-- Navbar -->
<nav class="navbar navbar-dark px-4 py-3 mb-4" style="background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%); box-shadow: 0 2px 12px rgba(37,99,235,0.18);">
  <div class="d-flex align-items-center gap-3">
    <span style="font-size:1.7rem;">&#9962;</span>
    <div>
      <span class="navbar-brand mb-0 fw-bold fs-5">DIZIMAN</span>
      <span class="text-white-50 ms-2 small">Sistema de Gestão da Igreja</span>
    </div>
  </div>
  <button class="btn btn-outline-light btn-sm" routerLink="/">
    <i class="bi bi-house-fill me-1"></i> Início
  </button>
</nav>

<div class="container-xl px-4 pb-5" style="max-width: 1100px;">

  <!-- Título da seção -->
  <div class="d-flex align-items-center justify-content-between mb-4">
    <div>
      <h4 class="fw-bold mb-0" style="color:#1e3a5f;"><i class="bi bi-people-fill me-2"></i>Cadastro de Membros</h4>
      <small class="text-muted">Gerencie os membros da sua igreja</small>
    </div>
    <button class="btn btn-primary px-4" (click)="abrirFormulario()" *ngIf="activeTab === 'lista'">
      <i class="bi bi-person-plus-fill me-2"></i>Novo Membro
    </button>
  </div>

  <!-- Toast de feedback -->
  <div class="position-fixed top-0 end-0 p-3" style="z-index: 9999;">
    <div *ngIf="toast.show" class="toast show align-items-center border-0 shadow-lg"
         [ngClass]="toast.type === 'success' ? 'bg-success text-white' : 'bg-danger text-white'"
         role="alert">
      <div class="d-flex">
        <div class="toast-body d-flex align-items-center gap-2">
          <i [ngClass]="toast.type === 'success' ? 'bi bi-check-circle-fill' : 'bi bi-x-circle-fill'"></i>
          {{ toast.message }}
        </div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" (click)="toast.show = false"></button>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <ul class="nav nav-tabs mb-4 border-bottom" style="border-color:#dee2e6;">
    <li class="nav-item">
      <a class="nav-link fw-semibold" [class.active]="activeTab === 'form'"
         (click)="activeTab = 'form'" style="cursor:pointer;">
        <i class="bi bi-person-plus me-1"></i>
        {{ editingMember ? 'Editar Membro' : 'Novo Membro' }}
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link fw-semibold" [class.active]="activeTab === 'lista'"
         (click)="activeTab = 'lista'" style="cursor:pointer;">
        <i class="bi bi-list-ul me-1"></i>
        Membros Cadastrados
        <span class="badge bg-primary ms-1">{{ members.length }}</span>
      </a>
    </li>
  </ul>

  <!-- ===== ABA: FORMULÁRIO ===== -->
  <div *ngIf="activeTab === 'form'">
    <div class="card border-0 shadow-sm" style="border-radius:16px; overflow:hidden;">
      <div class="card-header border-0 py-3 px-4" style="background: linear-gradient(90deg,#1e3a5f,#2563eb);">
        <h6 class="mb-0 text-white fw-semibold">
          <i class="bi me-2" [ngClass]="editingMember ? 'bi-pencil-square' : 'bi-person-plus-fill'"></i>
          {{ editingMember ? 'Editando: ' + member.name : 'Cadastrar Novo Membro' }}
        </h6>
      </div>
      <div class="card-body p-4">
        <form (ngSubmit)="onSubmit()" #memberForm="ngForm">

          <!-- Linha 1: Nome | Login -->
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold small text-uppercase text-muted">Nome Completo <span class="text-danger">*</span></label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                <input type="text" class="form-control border-start-0 ps-0" name="name"
                       [(ngModel)]="member.name" required placeholder="Ex: João da Silva">
              </div>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold small text-uppercase text-muted">Login <span class="text-danger">*</span></label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="bi bi-at text-muted"></i></span>
                <input type="text" class="form-control bor
